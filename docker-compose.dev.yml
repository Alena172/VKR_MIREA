services:
  backend:
    volumes:
      - ./backend:/app/backend
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    command: >
      sh -c "python -m alembic upgrade head &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    volumes:
      - ./backend:/app/backend
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    command: >
      sh -c "python -m celery -A app.celery_app:celery_app worker
      --loglevel=info --concurrency=2 -Q celery --pool=solo"

  frontend:
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_BASE_URL: /api/v1
      VITE_DEV_PROXY_TARGET: http://backend:8000
    command: >
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"
